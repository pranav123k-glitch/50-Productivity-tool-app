<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProHub — 50 Productivity Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090c14;--bg2:#0d1120;--bg3:#111827;
  --glass:rgba(255,255,255,0.04);--glass2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf0;--text2:#8b92a8;--text3:#555e78;
  --accent:#5b8def;--accent2:#7c5ce4;--accent3:#00d4aa;
  --red:#ef4f6a;--yellow:#f6c90e;--green:#00d4aa;
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
  --r:14px;--r2:10px;--shadow:0 8px 32px rgba(0,0,0,.5);
}
html{font-size:15px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;overflow-x:hidden}
button{font-family:var(--font-body);cursor:pointer;border:none;outline:none}
input,textarea,select{font-family:var(--font-body);outline:none;border:none;background:none;color:var(--text)}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ── BACKGROUND ── */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.35}

/* ── LAYOUT ── */
#app{position:relative;z-index:1}
#header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 28px;background:rgba(9,12,20,.85);
  backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;gap:16px;
}
#header h1{font-family:var(--font-head);font-size:1.3rem;font-weight:800;letter-spacing:-.01em;
  background:linear-gradient(135deg,#fff 0%,var(--accent) 60%,var(--accent2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
#search-wrap{position:relative;flex:1;max-width:380px}
#search{width:100%;padding:9px 16px 9px 38px;background:var(--glass2);
  border:1px solid var(--border);border-radius:99px;font-size:.9rem;color:var(--text);transition:.2s}
#search:focus{border-color:var(--accent);background:var(--glass)}
#search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
#tool-count{font-size:.78rem;color:var(--text3);white-space:nowrap}

/* ── DASHBOARD ── */
#dashboard{padding:28px;max-width:1400px;margin:0 auto}
.section-label{font-family:var(--font-head);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text3);margin:24px 0 12px;padding-left:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}

/* ── TOOL CARD ── */
.card{
  background:var(--glass);border:1px solid var(--border);border-radius:var(--r);
  padding:20px 16px 16px;cursor:pointer;position:relative;overflow:hidden;
  transition:transform .18s,border-color .18s,background .18s;
  display:flex;flex-direction:column;gap:10px;
}
.card::before{
  content:'';position:absolute;inset:0;opacity:0;
  background:radial-gradient(circle at 60% 20%,rgba(91,141,239,.15),transparent 70%);
  transition:opacity .25s;
}
.card:hover{transform:translateY(-3px);border-color:var(--border2);background:var(--glass2)}
.card:hover::before{opacity:1}
.card-icon{font-size:1.6rem;line-height:1}
.card-name{font-family:var(--font-head);font-size:.82rem;font-weight:700;color:var(--text)}
.card-desc{font-size:.73rem;color:var(--text3);line-height:1.4}
.card-tag{
  align-self:flex-start;font-size:.62rem;padding:2px 8px;border-radius:99px;
  font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-top:auto;
}

/* ── TOOL PANEL ── */
#panel{
  position:fixed;inset:0;z-index:200;
  display:none;align-items:flex-start;justify-content:center;
  padding:20px;background:rgba(5,7,15,.7);backdrop-filter:blur(12px);overflow-y:auto;
}
#panel.open{display:flex}
#panel-box{
  width:100%;max-width:760px;background:var(--bg2);
  border:1px solid var(--border2);border-radius:20px;
  overflow:hidden;box-shadow:var(--shadow);animation:slideUp .25s ease;
  margin:auto;
}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
#panel-head{
  display:flex;align-items:center;gap:12px;
  padding:18px 22px;border-bottom:1px solid var(--border);
  background:rgba(255,255,255,.02);
}
#panel-icon{font-size:1.4rem}
#panel-title{font-family:var(--font-head);font-size:1.05rem;font-weight:700;flex:1}
#panel-close{
  width:32px;height:32px;border-radius:8px;background:var(--glass2);
  color:var(--text2);font-size:1.1rem;display:flex;align-items:center;justify-content:center;
  transition:.15s;
}
#panel-close:hover{background:var(--red);color:#fff}
#panel-body{padding:22px;min-height:320px}

/* ── SHARED TOOL STYLES ── */
.t-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.t-input{
  flex:1;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r2);color:var(--text);font-size:.9rem;transition:.2s;min-width:100px;
}
.t-input:focus{border-color:var(--accent)}
.t-textarea{
  width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r2);color:var(--text);font-size:.88rem;resize:vertical;
  min-height:120px;line-height:1.6;transition:.2s;
}
.t-textarea:focus{border-color:var(--accent)}
.t-select{
  padding:10px 14px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r2);color:var(--text);font-size:.88rem;
}
.btn{
  padding:9px 18px;border-radius:var(--r2);font-size:.85rem;font-weight:600;
  transition:.15s;display:inline-flex;align-items:center;gap:6px;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#4a7de0;transform:translateY(-1px)}
.btn-ghost{background:var(--glass2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(239,79,106,.15);color:var(--red);border:1px solid rgba(239,79,106,.3)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-green{background:rgba(0,212,170,.15);color:var(--green);border:1px solid rgba(0,212,170,.3)}
.btn-green:hover{background:var(--green);color:#111}
.t-out{
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);
  padding:14px;margin-top:10px;font-size:.88rem;line-height:1.6;min-height:48px;word-break:break-all;
}
.t-label{font-size:.75rem;font-weight:600;color:var(--text2);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.t-big{font-family:var(--font-head);font-size:3rem;font-weight:800;text-align:center;
  color:var(--accent);letter-spacing:-.02em;margin:12px 0}
.t-chip{
  display:inline-flex;align-items:center;gap:6px;padding:5px 12px;
  background:var(--glass2);border:1px solid var(--border);border-radius:99px;
  font-size:.78rem;color:var(--text2);
}
.t-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.t-list li{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);
  font-size:.88rem;
}
.t-list li span{flex:1}
.t-list li button{background:none;color:var(--text3);font-size:1rem;transition:.15s}
.t-list li button:hover{color:var(--red)}
.t-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.t-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.t-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.t-stat{
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);
  padding:14px;text-align:center;
}
.t-stat .val{font-family:var(--font-head);font-size:1.5rem;font-weight:800;color:var(--accent)}
.t-stat .lbl{font-size:.72rem;color:var(--text3);margin-top:2px}
progress{width:100%;height:8px;border-radius:99px;overflow:hidden;border:none}
progress::-webkit-progress-bar{background:var(--bg3);border-radius:99px}
progress::-webkit-progress-value{background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px}
.tag-focus{background:rgba(246,201,14,.12);color:var(--yellow);border-color:rgba(246,201,14,.2)}
.tag-timer{background:rgba(239,79,106,.12);color:var(--red);border-color:rgba(239,79,106,.2)}
.tag-text{background:rgba(91,141,239,.12);color:var(--accent);border-color:rgba(91,141,239,.2)}
.tag-util{background:rgba(124,92,228,.12);color:var(--accent2);border-color:rgba(124,92,228,.2)}
.tag-life{background:rgba(0,212,170,.12);color:var(--green);border-color:rgba(0,212,170,.2)}
.tag-create{background:rgba(255,119,68,.12);color:#ff7744;border-color:rgba(255,119,68,.2)}

/* ── KANBAN ── */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kCol{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:12px;min-height:180px}
.kCol h4{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-bottom:10px}
.kCard{background:var(--glass2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;
  font-size:.82rem;margin-bottom:6px;cursor:grab;position:relative}
.kCard button{position:absolute;right:6px;top:50%;transform:translateY(-50%);
  background:none;color:var(--text3);font-size:.9rem}
.kCard button:hover{color:var(--red)}

/* ── WHITEBOARD ── */
#wb-canvas{border:1px solid var(--border);border-radius:var(--r2);cursor:crosshair;
  width:100%;touch-action:none;display:block}
.wb-tools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.wb-color{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.15s}
.wb-color.active,.wb-color:hover{border-color:#fff}
.wb-sz{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--text2)}
.wb-sz input{width:80px;accent-color:var(--accent)}

/* ── FLASHCARD ── */
.fc-card{
  perspective:800px;cursor:pointer;min-height:180px;
  border-radius:var(--r);margin:10px 0;
}
.fc-inner{width:100%;height:180px;position:relative;transform-style:preserve-3d;transition:transform .5s}
.fc-card.flipped .fc-inner{transform:rotateY(180deg)}
.fc-face{
  position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;padding:24px;
  text-align:center;font-size:1.05rem;border:1px solid var(--border);
}
.fc-front{background:linear-gradient(135deg,rgba(91,141,239,.1),rgba(124,92,228,.1))}
.fc-back{background:linear-gradient(135deg,rgba(0,212,170,.1),rgba(91,141,239,.1));transform:rotateY(180deg)}

/* ── EISENHOWER ── */
.eisen{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.eQ{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:12px;min-height:120px}
.eQ h4{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.eQ.q1 h4{color:var(--red)}
.eQ.q2 h4{color:var(--accent)}
.eQ.q3 h4{color:var(--yellow)}
.eQ.q4 h4{color:var(--text3)}
.eItem{font-size:.8rem;padding:4px 8px;background:var(--glass);border-radius:6px;margin-bottom:4px;
  display:flex;align-items:center;gap:6px}
.eItem button{background:none;color:var(--text3);margin-left:auto}
.eItem button:hover{color:var(--red)}

/* ── SPIN WHEEL ── */
#spin-canvas{display:block;margin:0 auto;max-width:100%}

/* ── MOOD TRACKER ── */
.mood-btns{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.mood-btn{padding:10px 14px;border-radius:var(--r2);background:var(--glass2);
  border:1px solid var(--border);font-size:1.1rem;transition:.15s;cursor:pointer}
.mood-btn:hover,.mood-btn.selected{border-color:var(--accent);background:rgba(91,141,239,.15)}
.mood-log{margin-top:12px;display:flex;flex-direction:column;gap:6px;max-height:160px;overflow-y:auto}
.mood-entry{display:flex;gap:10px;align-items:center;padding:8px 12px;
  background:var(--bg3);border-radius:8px;font-size:.82rem;color:var(--text2)}

/* ── GRADIENT GEN ── */
.grad-preview{height:100px;border-radius:var(--r2);margin:12px 0;transition:.3s;
  border:1px solid var(--border)}
.grad-stops{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.grad-stop{width:36px;height:36px;border-radius:8px;cursor:pointer;border:2px solid var(--border);transition:.15s}
.grad-stop:hover{border-color:#fff;transform:scale(1.1)}

/* ── STICKY NOTES ── */
.sticky-board{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:10px}
.sticky{border-radius:var(--r2);padding:14px;min-height:110px;font-size:.83rem;line-height:1.5;
  position:relative;word-break:break-word;border:1px solid transparent}
.sticky textarea{width:100%;background:none;resize:none;color:#111;font-size:.82rem;
  min-height:72px;line-height:1.5;border:none;outline:none;font-family:var(--font-body)}
.sticky-del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.15);
  border:none;border-radius:50%;width:18px;height:18px;font-size:.75rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:#333}
.sticky-del:hover{background:rgba(0,0,0,.35);color:#fff}

/* ── FOCUS MODE ── */
#focus-overlay{
  position:fixed;inset:0;z-index:9999;background:#000;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;
}
#focus-overlay.on{display:flex}
#focus-time{font-family:var(--font-head);font-size:4rem;font-weight:800;color:var(--accent)}
#focus-msg{font-size:1.1rem;color:var(--text2)}

/* ── TYPEWRITER ── */
#tw-area{min-height:200px;font-size:1rem;line-height:1.8;padding:16px;
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2)}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  #header{padding:12px 16px}
  #dashboard{padding:16px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
  .t-big{font-size:2.2rem}
  .kanban{grid-template-columns:1fr}
  .eisen{grid-template-columns:1fr}
  .t-grid2,.t-grid3{grid-template-columns:1fr}
  #panel{padding:0}
  #panel-box{border-radius:0;min-height:100vh}
}

/* ── NO RESULTS ── */
#no-results{display:none;text-align:center;padding:60px 20px;color:var(--text3)}
#no-results .nr-icon{font-size:3rem;margin-bottom:16px}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div id="app">
  <header id="header">
    <h1>⚡ ProHub</h1>
    <div id="search-wrap">
      <span id="search-icon">🔍</span>
      <input id="search" type="text" placeholder="Search 50 tools…" autocomplete="off" oninput="filterTools()">
    </div>
    <span id="tool-count">50 tools</span>
  </header>

  <div id="dashboard">
    <div id="no-results">
      <div class="nr-icon">🔎</div>
      <div>No tools found. Try a different keyword.</div>
    </div>
    <!-- Cards injected by JS -->
  </div>
</div>

<!-- TOOL PANEL -->
<div id="panel">
  <div id="panel-box">
    <div id="panel-head">
      <span id="panel-icon"></span>
      <span id="panel-title"></span>
      <button id="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div id="panel-body"></div>
  </div>
</div>

<!-- FOCUS MODE OVERLAY -->
<div id="focus-overlay">
  <div id="focus-time">00:00</div>
  <div id="focus-msg">Stay focused. You've got this. 🎯</div>
  <button class="btn btn-ghost" onclick="exitFocus()">Exit Focus Mode</button>
</div>

<script>
/* ═══════════════════════════════════════════
   ANIMATED BACKGROUND
═══════════════════════════════════════════ */
(function(){
  const c=document.getElementById('bg-canvas'),ctx=c.getContext('2d');
  let w,h,pts=[];
  function resize(){w=c.width=innerWidth;h=c.height=innerHeight;pts=Array.from({length:60},()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.5}))}
  function draw(){
    ctx.clearRect(0,0,w,h);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>w)p.vx*=-1;
      if(p.y<0||p.y>h)p.vy*=-1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);
      ctx.fillStyle='rgba(91,141,239,.6)';ctx.fill();
    });
    pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{
      const d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<120){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
        ctx.strokeStyle=`rgba(91,141,239,${.12*(1-d/120)})`;ctx.lineWidth=.8;ctx.stroke();}
    }));
    requestAnimationFrame(draw);
  }
  resize();draw();window.addEventListener('resize',resize);
})();

/* ═══════════════════════════════════════════
   TOOL DEFINITIONS
═══════════════════════════════════════════ */
const TOOLS=[
  // FOCUS
  {id:'todo',icon:'✅',name:'To-Do List',desc:'Add, check, and clear tasks',tag:'focus',color:'tag-focus'},
  {id:'pomodoro',icon:'🍅',name:'Pomodoro Timer',desc:'25/5 focus sessions',tag:'focus',color:'tag-focus'},
  {id:'focus',icon:'🎯',name:'Focus Mode',desc:'Distraction-free full screen',tag:'focus',color:'tag-focus'},
  {id:'daily',icon:'📋',name:'Daily Checklist',desc:'Today\'s recurring tasks',tag:'focus',color:'tag-focus'},
  {id:'eisenhower',icon:'🧭',name:'Eisenhower Matrix',desc:'Urgent vs important tasks',tag:'focus',color:'tag-focus'},
  {id:'kanban',icon:'📊',name:'Kanban Board',desc:'To-do, doing, done columns',tag:'focus',color:'tag-focus'},
  {id:'goals',icon:'🏆',name:'Goal Tracker',desc:'Set and track your goals',tag:'focus',color:'tag-focus'},
  {id:'weekreview',icon:'📅',name:'Weekly Review',desc:'Reflect on your week',tag:'focus',color:'tag-focus'},
  {id:'braindump',icon:'🧠',name:'Brain Dump',desc:'Get everything out of your head',tag:'focus',color:'tag-focus'},
  {id:'session',icon:'⏱️',name:'Session Tracker',desc:'Log your work sessions',tag:'focus',color:'tag-focus'},
  // TIMERS
  {id:'stopwatch',icon:'⏱',name:'Stopwatch',desc:'Start, stop, lap timer',tag:'timer',color:'tag-timer'},
  {id:'countdown',icon:'⏳',name:'Countdown Timer',desc:'Set a custom countdown',tag:'timer',color:'tag-timer'},
  {id:'break',icon:'☕',name:'Break Reminder',desc:'Hourly nudge to rest',tag:'timer',color:'tag-timer'},
  {id:'timezone',icon:'🌍',name:'Time Zone Viewer',desc:'Compare world times',tag:'timer',color:'tag-timer'},
  // TEXT
  {id:'notes',icon:'📝',name:'Notes App',desc:'Quick markdown-ish notes',tag:'text',color:'tag-text'},
  {id:'wordcount',icon:'🔢',name:'Word Counter',desc:'Count words, chars, lines',tag:'text',color:'tag-text'},
  {id:'formatter',icon:'✨',name:'Text Formatter',desc:'Upper/lower/title/trim',tag:'text',color:'tag-text'},
  {id:'markdown',icon:'📄',name:'Markdown Preview',desc:'Write and preview markdown',tag:'text',color:'tag-text'},
  {id:'tts',icon:'🔊',name:'Text-to-Speech',desc:'Speak any text aloud',tag:'text',color:'tag-text'},
  {id:'stt',icon:'🎤',name:'Speech-to-Text',desc:'Dictate text via mic',tag:'text',color:'tag-text'},
  {id:'typewriter',icon:'⌨️',name:'Typewriter Notes',desc:'Focus typing with autosave',tag:'text',color:'tag-text'},
  {id:'flashcards',icon:'🃏',name:'Flashcards',desc:'Create and flip study cards',tag:'text',color:'tag-text'},
  {id:'json',icon:'{ }',name:'JSON Formatter',desc:'Beautify or minify JSON',tag:'text',color:'tag-text'},
  {id:'tts2',icon:'📢',name:'Affirmation Gen',desc:'Daily positive affirmations',tag:'text',color:'tag-text'},
  {id:'quotes',icon:'💬',name:'Motivational Quotes',desc:'Random inspiring quotes',tag:'text',color:'tag-text'},
  // UTILITIES

/* ═══════════════════════════════════════════
   RENDER DASHBOARD
═══════════════════════════════════════════ */
function renderDashboard(filter=''){
  const dash=document.getElementById('dashboard');
  const f=filter.toLowerCase().trim();
  const filtered=TOOLS.filter(t=>!f||t.name.toLowerCase().includes(f)||t.desc.toLowerCase().includes(f)||t.tag.includes(f));
  document.getElementById('no-results').style.display=filtered.length?'none':'block';
  // Remove old sections
  dash.querySelectorAll('.section-label,.grid').forEach(e=>e.remove());
  if(f){
    const g=document.createElement('div');g.className='grid';
    filtered.forEach(t=>g.appendChild(makeCard(t)));
    dash.appendChild(g);
    document.getElementById('tool-count').textContent=`${filtered.length} tools`;
    return;
  }
  document.getElementById('tool-count').textContent='50 tools';
  CATEGORIES.forEach(cat=>{
    const items=TOOLS.filter(t=>t.tag===cat.key);
    if(!items.length)return;
    const lbl=document.createElement('div');lbl.className='section-label';lbl.textContent=cat.label;
    dash.appendChild(lbl);
    const g=document.createElement('div');g.className='grid';
    items.forEach(t=>g.appendChild(makeCard(t)));
    dash.appendChild(g);
  });
}
function makeCard(t){
  const c=document.createElement('div');c.className='card';c.dataset.id=t.id;
  c.innerHTML=`<div class="card-icon">${t.icon}</div><div class="card-name">${t.name}</div><div class="card-desc">${t.desc}</div><span class="card-tag ${t.color}">${t.tag}</span>`;
  c.onclick=()=>openTool(t.id);
  return c;
}
function filterTools(){renderDashboard(document.getElementById('search').value)}
renderDashboard();

function openTool(id){
  const t=TOOLS.find(x=>x.id===id);
  document.getElementById('panel-icon').textContent=t.icon;
  document.getElementById('panel-title').textContent=t.name;
  document.getElementById('panel-body').innerHTML=render(id);
  document.getElementById('panel').classList.add('open');
  document.body.style.overflow='hidden';
  afterRender(id);
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.body.style.overflow='';
  stopPomodoro();stopStopwatch();stopCountdown();stopBreak();
}

let pomInt=null,pomSec=0,pomMode='work',pomRound=0;
function renderPomodoro(){
  return `<div style="text-align:center">
    <div class="t-big" id="pom-display">25:00</div>
    <div style="margin:8px 0 20px;color:var(--text3);font-size:.9rem" id="pom-label">Work Session</div>
    <div class="t-row" style="justify-content:center">
      <button class="btn btn-primary" id="pom-btn" onclick="togglePomodoro()">▶ Start</button>
      <button class="btn btn-ghost" onclick="resetPomodoro()">↺ Reset</button>
    </div>
    <div class="t-grid3" style="margin-top:20px">
      <div class="t-stat"><div class="val" id="pom-rounds">0</div><div class="lbl">Sessions</div></div>
      <div class="t-stat"><div class="val" id="pom-focus">0m</div><div class="lbl">Focus Time</div></div>
      <div class="t-stat"><div class="val" id="pom-breaks">0</div><div class="lbl">Breaks</div></div>
    </div>
    <div style="margin-top:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-ghost" onclick="setPomDur(25,'Work')">25m Work</button>
      <button class="btn btn-ghost" onclick="setPomDur(5,'Short Break')">5m Break</button>
      <button class="btn btn-ghost" onclick="setPomDur(15,'Long Break')">15m Break</button>
    </div>
  </div>`;
}
function setPomDur(m,label){pomSec=m*60;pomMode=label;updatePomDisplay();document.getElementById('pom-label').textContent=label}
function togglePomodoro(){
  if(pomInt){clearInterval(pomInt);pomInt=null;document.getElementById('pom-btn').textContent='▶ Resume';return}
  if(pomSec===0)pomSec=25*60;
  pomInt=setInterval(()=>{
    pomSec--;updatePomDisplay();
    if(pomSec<=0){clearInterval(pomInt);pomInt=null;pomRound++;
      document.getElementById('pom-rounds').textContent=pomRound;
      document.getElementById('pom-focus').textContent=(pomRound*25)+'m';
      alert('Session complete! 🎉');pomSec=25*60;updatePomDisplay();}
  },1000);
  document.getElementById('pom-btn').textContent='⏸ Pause';
}
function stopPomodoro(){clearInterval(pomInt);pomInt=null;}
function resetPomodoro(){stopPomodoro();pomSec=25*60;updatePomDisplay();document.getElementById('pom-btn').textContent='▶ Start';}
function updatePomDisplay(){const el=document.getElementById('pom-display');if(el)el.textContent=fmtTime(pomSec)}

  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">
    ${['C','±','%','÷','7','8','9','×','4','5','6','−','1','2','3','+','0','.','^','='].map(b=>`<button class="btn ${b==='='?'btn-primary':/[÷×−+^%]/.test(b)?'btn-ghost':'btn-ghost'}" style="padding:13px;font-size:${b==='='?'1.1rem':'.95rem'};font-weight:700" onclick="calcInput('${b}')">${b}</button>`).join('')}
  </div>`;

let calcVal='0',calcOp='',calcPrev='';
function calcInput(v){
  const d=document.getElementById('calc-display');
  if(v==='C'){calcVal='0';calcOp='';calcPrev='';d.textContent='0';return}
  if(v==='±'){calcVal=String(-parseFloat(calcVal));d.textContent=calcVal;return}
  if(v==='%'){calcVal=String(parseFloat(calcVal)/100);d.textContent=calcVal;return}
  if(['+','−','×','÷','^'].includes(v)){calcPrev=calcVal;calcOp=v;calcVal='0';return}
  if(v==='='){
    const a=parseFloat(calcPrev),b=parseFloat(calcVal);
    const ops={'+':a+b,'−':a-b,'×':a*b,'÷':b?a/b:NaN,'^':Math.pow(a,b)};
    calcVal=String(calcOp&&calcOp in ops?ops[calcOp]:b);d.textContent=calcVal;calcOp='';return;
  }
  if(v==='.'&&calcVal.includes('.'))return;
  calcVal=(calcVal==='0'&&v!=='.')?v:calcVal+v;d.textContent=calcVal;
}

    <select class="t-select" id="uc-to" onchange="convertUnit()"></select>
  </div>
  <div class="t-out" id="uc-out" style="font-size:1.2rem;font-weight:700;text-align:center;padding:18px;color:var(--accent)"></div>`;

function updateUCUnits(){
  const cat=document.getElementById('uc-cat').value;const u=UNITS[cat];
  const keys=cat==='Temperature'?['Celsius','Fahrenheit','Kelvin']:Object.keys(u);
  ['uc-from','uc-to'].forEach((id,i)=>{const el=document.getElementById(id);if(el){el.innerHTML=keys.map((k,j)=>`<option ${j===i?'selected':''}>${k}</option>`).join('')}});
  convertUnit();
}
function convertUnit(){
  const cat=document.getElementById('uc-cat').value;const v=parseFloat(document.getElementById('uc-val').value);
  const from=document.getElementById('uc-from').value;const to=document.getElementById('uc-to').value;
  let result;
  if(cat==='Temperature'){
    let c=from==='Celsius'?v:from==='Fahrenheit'?(v-32)*5/9:v-273.15;
    result=to==='Celsius'?c:to==='Fahrenheit'?c*9/5+32:c+273.15;
  }else{const u=UNITS[cat];result=(v/u[from])*u[to]}
  const el=document.getElementById('uc-out');if(el)el.textContent=`${v} ${from} = ${result.toFixed(6).replace(/\.?0+$/,'')} ${to}`;
}

    <br>
    <button class="btn btn-primary" style="margin-top:10px" onclick="spinWheel()">🎡 Spin!</button>
  </div>
  <div class="t-out" id="dec-result" style="text-align:center;font-size:1.1rem;margin-top:10px"></div>`;
}
function afterRenderDecision(){renderDecOpts();drawWheel(0)}
let decOpts=[];
function addDecOpt(){const el=document.getElementById('dec-in');if(!el.value.trim())return;decOpts.push(el.value.trim());el.value='';renderDecOpts();drawWheel(0)}
function renderDecOpts(){const el=document.getElementById('dec-opts');if(!el)return;el.innerHTML=decOpts.map((o,i)=>`<div class="t-chip">${escHtml(o)}<button onclick="decOpts.splice(${i},1);renderDecOpts();drawWheel(0)" style="background:none;color:var(--text3);margin-left:6px;cursor:pointer">✕</button></div>`).join('')}
const WHEEL_COLORS=['#5b8def','#7c5ce4','#00d4aa','#ef4f6a','#f6c90e','#ff7744','#a29bfe','#fd79a8'];
function drawWheel(angle){
  const c=document.getElementById('spin-canvas');if(!c)return;
  const ctx=c.getContext('2d'),cx=120,cy=120,r=110,items=decOpts.length?decOpts:['Option 1','Option 2','Option 3','Option 4'];
  ctx.clearRect(0,0,240,240);
  items.forEach((item,i)=>{
    const start=angle+i*(2*Math.PI/items.length),end=start+(2*Math.PI/items.length);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,end);ctx.closePath();
    ctx.fillStyle=WHEEL_COLORS[i%WHEEL_COLORS.length];ctx.fill();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(start+(end-start)/2);
    ctx.fillStyle='#fff';ctx.font='bold 11px Syne,sans-serif';ctx.textAlign='right';
    ctx.fillText(item.length>10?item.slice(0,10)+'…':item,r-8,4);ctx.restore();
  });
  ctx.beginPath();ctx.arc(cx,cy,12,0,2*Math.PI);ctx.fillStyle='#090c14';ctx.fill();
}
function spinWheel(){
  if(!decOpts.length){alert('Add options first!');return}
  let spin=Math.random()*10+5;let angle=0;let frame=0;
  const total=150+Math.floor(Math.random()*150);
  function step(){frame++;angle+=spin*(1-frame/total);drawWheel(angle);
    if(frame<total)requestAnimationFrame(step);
    else{const idx=Math.floor(((2*Math.PI-(angle%(2*Math.PI)))/(2*Math.PI/decOpts.length)))%decOpts.length;
      document.getElementById('dec-result').textContent='🎉 Result: '+decOpts[idx];}
  }requestAnimationFrame(step);
}

    <div class="t-stat"><div class="val" id="exp-total" style="color:var(--accent)">₹${total.toFixed(2)}</div><div class="lbl">Balance</div></div>
    <div class="t-stat"><div class="val" id="exp-count">${items.length}</div><div class="lbl">Entries</div></div>
  </div>
  <ul class="t-list" id="exp-list" style="max-height:200px;overflow-y:auto">${items.slice(-10).reverse().map((e,i)=>`<li><span>${e.type} ${escHtml(e.name)}</span><span style="color:${e.type==='💸 Expense'?'var(--red)':'var(--green)'};font-weight:700">${e.type==='💸 Expense'?'-':'+'}${Math.abs(e.amount).toFixed(2)}</span></li>`).join('')}</ul>
  <button class="btn btn-danger" style="margin-top:12px" onclick="ls.set('expenses',[]);openTool('expense')">Clear All</button>`;
}
function addExpense(){
  const n=document.getElementById('exp-name').value.trim();const a=parseFloat(document.getElementById('exp-amt').value);const t=document.getElementById('exp-type').value;
  if(!n||isNaN(a))return;const items=ls.get('expenses',[]);
  items.push({name:n,amount:t==='💸 Expense'?-Math.abs(a):Math.abs(a),type:t});ls.set('expenses',items);
  document.getElementById('exp-name').value='';document.getElementById('exp-amt').value='';openTool('expense');
}

/* ─── CALENDAR ─── */
function renderCalendar(){
  const now=new Date();
  return `<div id="cal-wrap">${buildCalendar(now.getFullYear(),now.getMonth())}</div>`;
}
function buildCalendar(y,m){
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const first=new Date(y,m,1).getDay();const days=new Date(y,m+1,0).getDate();const today=new Date();
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <button class="btn btn-ghost" onclick="navCal(${y},${m-1})">◀</button>
    <span style="font-family:var(--font-head);font-weight:700">${months[m]} ${y}</span>
    <button class="btn btn-ghost" onclick="navCal(${y},${m+1})">▶</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center">
    ${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div style="font-size:.72rem;font-weight:700;color:var(--text3);padding:4px">${d}</div>`).join('')}
    ${Array(first).fill('<div></div>').join('')}
    ${Array.from({length:days},(_,i)=>{const d=i+1;const isToday=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;return `<div style="padding:6px 2px;border-radius:8px;font-size:.85rem;cursor:default;${isToday?'background:var(--accent);color:#fff;font-weight:700':''}">${d}</div>`}).join('')}
  </div>`;
  return html;
}
function navCal(y,m){if(m<0){m=11;y--}if(m>11){m=0;y++}const el=document.getElementById('cal-wrap');if(el)el.innerHTML=buildCalendar(y,m)}

/* ─── WHITEBOARD ─── */
function renderWhiteboard(){
  return `<div class="wb-tools">
    <div class="wb-color active" style="background:#5b8def" onclick="setWBColor('#5b8def',this)"></div>
    <div class="wb-color" style="background:#fff" onclick="setWBColor('#ffffff',this)"></div>
    <div class="wb-color" style="background:#ef4f6a" onclick="setWBColor('#ef4f6a',this)"></div>
    <div class="wb-color" style="background:#00d4aa" onclick="setWBColor('#00d4aa',this)"></div>
    <div class="wb-color" style="background:#f6c90e" onclick="setWBColor('#f6c90e',this)"></div>
    <div class="wb-color" style="background:#7c5ce4" onclick="setWBColor('#7c5ce4',this)"></div>
    <div class="wb-sz"><input type="range" id="wb-size" min="1" max="30" value="3" style="accent-color:var(--accent)"><span id="wb-sz-val">3px</span></div>
    <button class="btn btn-ghost" id="wb-eraser" onclick="toggleEraser()">Eraser</button>
    <button class="btn btn-danger" onclick="clearWB()">Clear</button>
  </div>
  <canvas id="wb-canvas" height="320"></canvas>`;
}
function afterRenderWhiteboard(){
  const c=document.getElementById('wb-canvas');if(!c)return;
  c.width=c.offsetWidth||600;
  const ctx=c.getContext('2d');let drawing=false,erasing=false,color='#5b8def';
  document.getElementById('wb-size').oninput=function(){document.getElementById('wb-sz-val').textContent=this.value+'px'};
  window.wbCtx=ctx;window.wbColor=color;window.wbErasing=false;
  function pos(e){const r=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
  function start(e){drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y)}
  function move(e){
    if(!drawing)return;e.preventDefault();const p=pos(e);
    ctx.lineWidth=parseInt(document.getElementById('wb-size').value);
    ctx.lineCap='round';ctx.strokeStyle=window.wbErasing?'#0d1120':window.wbColor;
    ctx.lineTo(p.x,p.y);ctx.stroke();ctx.beginPath();ctx.moveTo(p.x,p.y);
  }
  function end(){drawing=false;ctx.beginPath()}
  c.addEventListener('mousedown',start);c.addEventListener('mousemove',move);c.addEventListener('mouseup',end);c.addEventListener('mouseleave',end);
  c.addEventListener('touchstart',e=>{e.preventDefault();start(e)},{passive:false});c.addEventListener('touchmove',e=>{e.preventDefault();move(e)},{passive:false});c.addEventListener('touchend',end);
}
function setWBColor(c,el){window.wbColor=c;window.wbErasing=false;document.querySelectorAll('.wb-color').forEach(e=>e.classList.remove('active'));el.classList.add('active')}
function toggleEraser(){window.wbErasing=!window.wbErasing;document.getElementById('wb-eraser').style.background=window.wbErasing?'var(--red)':''}
function clearWB(){const c=document.getElementById('wb-canvas');if(c&&window.wbCtx)window.wbCtx.clearRect(0,0,c.width,c.height)}

const STICKY_COLORS=['#fef08a','#bbf7d0','#bfdbfe','#fecaca','#e9d5ff','#fed7aa'];
function renderSticky(){
  const notes=ls.get('stickynotes',[]);
  return `<button class="btn btn-primary" onclick="addSticky()">+ New Note</button>
  <div class="sticky-board" id="sticky-board">${notes.map((n,i)=>`<div class="sticky" style="background:${n.color}"><button class="sticky-del" onclick="removeSticky(${i})">✕</button><textarea style="color:#111;font-family:var(--font-body)" oninput="editSticky(${i},this.value)">${escHtml(n.text)}</textarea></div>`).join('')}</div>`;
}
function addSticky(){const a=ls.get('stickynotes',[]);a.push({text:'',color:STICKY_COLORS[a.length%STICKY_COLORS.length]});ls.set('stickynotes',a);openTool('sticky')}
function editSticky(i,v){const a=ls.get('stickynotes',[]);a[i].text=v;ls.set('stickynotes',a)}
function removeSticky(i){const a=ls.get('stickynotes',[]);a.splice(i,1);ls.set('stickynotes',a);openTool('sticky')}

/* ─── DIMMER ─── */
let dimmerDiv=null;
function renderDimmer(){
  return `<div style="text-align:center;padding:10px 0">
    <p style="color:var(--text2);margin-bottom:20px">Reduce screen brightness with an overlay.</p>
    <div class="t-row" style="justify-content:center">
      <label style="color:var(--text2)">Opacity:</label>
      <input type="range" id="dim-opacity" min="0" max="0.9" step="0.05" value="0.5" style="accent-color:var(--accent);flex:1;max-width:200px" oninput="updateDimmer()">
      <span id="dim-val" style="color:var(--accent);font-weight:700">50%</span>
    </div>
    <div style="margin-top:16px;display:flex;gap:10px;justify-content:center">
      <button class="btn btn-primary" onclick="enableDimmer()">Enable Dimmer</button>
      <button class="btn btn-danger" onclick="disableDimmer()">Disable</button>
    </div>
  </div>`;
}
function enableDimmer(){
  if(!dimmerDiv){dimmerDiv=document.createElement('div');dimmerDiv.style.cssText='position:fixed;inset:0;background:#000;pointer-events:none;z-index:9998';document.body.appendChild(dimmerDiv)}
  dimmerDiv.style.opacity=document.getElementById('dim-opacity').value;
}
function updateDimmer(){document.getElementById('dim-val').textContent=Math.round(document.getElementById('dim-opacity').value*100)+'%';if(dimmerDiv)dimmerDiv.style.opacity=document.getElementById('dim-opacity').value}
function disableDimmer(){if(dimmerDiv){dimmerDiv.remove();dimmerDiv=null}}

function fmtTime(s){return `${pad(Math.floor(s/60))}:${pad(s%60)}`}
function pad(n){return String(n).padStart(2,'0')}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function copyEl(id){const el=document.getElementById(id);if(el)copyText(el.textContent)}
function copyText(t){navigator.clipboard.writeText(t).then(()=>{/* silent */}).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove()})}
</script>
